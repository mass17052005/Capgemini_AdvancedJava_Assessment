spring.application.name=booking-service
server.port=8084

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.movieService.register-health-indicator=true
resilience4j.circuitbreaker.instances.movieService.sliding-window-size=5
resilience4j.circuitbreaker.instances.movieService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.movieService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.movieService.permitted-number-of-calls-in-half-open-state=3

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.health.circuitbreakers.enabled=true

# Distributed Tracing — Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
