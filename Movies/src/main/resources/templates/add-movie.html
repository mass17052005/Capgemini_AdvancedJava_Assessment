<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie</title>
</head>
<body>

<h2>Add Movie</h2>

<form th:action="@{/movies}" th:object="${movie}" method="post">

    Title: <input type="text" th:field="*{title}" /><br><br>

    Genre: <input type="text" th:field="*{genre}" /><br><br>

    Director: <input type="text" th:field="*{director}" /><br><br> <!-- ADDED -->

    Year: <input type="number" th:field="*{release_year}" /><br><br> <!-- CHANGED -->

    Rating: <input type="number" step="0.1" th:field="*{rating}" /><br><br> <!-- ADDED -->

    <button type="submit">Save</button>

</form>

<br>
<a th:href="@{/movies}">Back to List</a>

</body>
</html>
