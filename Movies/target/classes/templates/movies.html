<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movies List</title>
</head>
<body>

<h2>All Movies</h2>

<a th:href="@{/movies/new}">Add New Movie</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th> <!-- CHANGED -->
        <th>Genre</th>
        <th>Director</th> <!-- ADDED -->
        <th>Year</th> <!-- ADDED -->
        <th>Rating</th> <!-- ADDED -->
        <th>Actions</th>
    </tr>

    <tr th:each="movie : ${movies}">
        <td th:text="${movie.id}"></td>
        <td th:text="${movie.title}"></td> <!-- CHANGED (was movie.name) -->
        <td th:text="${movie.genre}"></td>
        <td th:text="${movie.director}"></td> <!-- ADDED -->
        <td th:text="${movie.release_year}"></td> <!-- ADDED -->
        <td th:text="${movie.rating}"></td> <!-- ADDED -->
        <td>
            <a th:href="@{/movies/delete/{id}(id=${movie.id})}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
